<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대기사 : 로그인</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="container">
        <header class="site-header">
            <h1>대기사(大棋士) : 시대를 지배한 거장들</h1>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">홈</a></li>
                    <li><a href="screen1.html">돌부처(이창호)</a></li>
                    <li><a href="screen2.html">날쎈바둑(이세돌)</a></li>
                    <li><a href="screen3.html">비운의 천재(박정환)</a></li>
                    <li><a href="screen4.html">전무후무의 기재(신진서)</a></li>
                </ul>
            </nav>
        </header>

        <main class="login-container">
            <div class="login-box">
                <h2>로그인</h2>
                <p class="login-subtitle">대기사 사이트에 오신 것을 환영합니다.</p>
                
                <form action="#" method="POST" class="login-form">
                    <div class="input-group">
                        <label for="username">아이디</label>
                        <input type="text" id="username" name="username" placeholder="아이디를 입력하세요" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">비밀번호</label>
                        <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
                    </div>

                    <button type="submit" class="login-btn">시작하기</button>
                </form>

                <div class="login-footer">
                    <a href="#">아이디 찾기</a>
                    <span class="divider">|</span>
                    <a href="#">비밀번호 찾기</a>
                    <span class="divider">|</span>
                    <a href="#">회원가입</a>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 대기사(大棋士) 프로젝트. All Rights Reserved.</p>
        </footer>
    </div>
</body>
</html>
